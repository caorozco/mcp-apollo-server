# Tool to get the properties of specific equipment 
# filterBy must be used to filter one or several equipment.
# field filterBy must be an array.
# field filterType value must be "EQUIP_INST_NAME"
# field operator value must be "IS_ONE_OF"
# field stringSet value must be a list of strings with the name of the filtered equipment
# Follow this example:
# {
#   "filterBy": [
#     {
#       "filterType": "EQUIP_INST_NAME",
#       "operator": "IS_ONE_OF",
#       "stringSet": ["Ayora_v52289_Cofrentes-NEC"]
#     }
#   ]
# }
query getEquipmentProperties ($filterBy: [EquipmentFilterInput!]) {
  equipments(filterBy: $filterBy) {
    edges {
      node {
        dn
        id
        name
        properties {
          propertyType {
            name
          }
          rawValue
        }
      }
    }
  }
}